<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Elite Sales Master - SANDBOX</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: #020617;
            color: #f1f5f9;
            overflow-x: hidden;
        }

        .glass {
            background: rgba(30, 41, 59, 0.4);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .btn-primary {
            background: linear-gradient(135deg, #f97316 0%, #a855f7 100%);
            transition: all 0.3s ease;
        }

        .view-section {
            display: none;
            min-height: 100vh;
            width: 100%;
            flex-direction: column;
        }

        .view-active {
            display: flex !important;
        }

        .card-bi {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-top: 4px solid #3b82f6;
        }

        #modalGestao {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 100;
            background: rgba(2, 6, 23, 0.98);
            align-items: flex-start;
            justify-content: center;
            padding: 20px;
            overflow-y: auto;
        }

        .input-compact {
            padding: 0.8rem !important;
            border-radius: 1rem !important;
            background: #0f172a;
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            width: 100%;
            outline: none;
        }

        .day-btn {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            cursor: pointer;
            padding: 12px;
            border-radius: 15px;
            font-size: 10px;
            font-weight: 800;
            color: white;
        }

        .day-btn.active {
            background: #3b82f6 !important;
            border-color: #60a5fa !important;
        }

        .label-custo {
            font-size: 8px;
            font-weight: 800;
            text-transform: uppercase;
            color: #64748b;
            margin-bottom: 4px;
            margin-left: 4px;
            display: block;
        }

        /* ESTILO DO LED */
        .led-bot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 5px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
        }

        .led-offline {
            background: #ef4444;
            box-shadow: 0 0 8px #ef4444;
        }

        .led-online {
            background: #10b981;
            box-shadow: 0 0 8px #10b981;
        }
    </style>
</head>

<body>

    <div id="modalGestao">
        <div class="w-full max-w-sm glass rounded-[2.5rem] p-8 shadow-2xl text-white mx-auto mt-10">
            <div class="flex justify-between items-center mb-6">
                <h2 id="gestao-titulo" class="text-lg font-black uppercase text-blue-400">Gestão</h2>
                <button onclick="window.fecharModalGestao()" class="bg-slate-800 text-white w-8 h-8 rounded-full">✕</button>
            </div>
            <div id="gestao-menu" class="grid grid-cols-1 gap-3">
                <button onclick="window.fluxoResultado()" class="bg-emerald-600/20 border border-emerald-500/30 p-6 rounded-3xl text-emerald-400 font-black uppercase text-sm">Registrar Venda</button>
                <button onclick="window.fluxoNQ()" class="bg-rose-600/10 border border-rose-500/30 p-3 rounded-2xl text-rose-500 font-black uppercase text-[10px]">Marcar NQ</button>
                <button onclick="window.limparRegistroVisita()" class="bg-slate-700/50 border border-white/10 p-3 rounded-2xl text-white font-black uppercase text-[10px]">Limpar Registro</button>
                <button onclick="window.confirmarExclusao()" class="text-slate-600 text-[9px] uppercase font-bold mt-2 text-center">Excluir Registro</button>
            </div>
            <div id="gestao-form" class="hidden space-y-3 pb-6 text-white"></div>
        </div>
    </div>

    <section id="view-agendamento" class="view-section view-active text-white">
        <header class="p-4 flex justify-between items-center text-white">
            <div class="flex flex-col">
                <span class="text-lg font-black uppercase italic tracking-tighter text-white">Portal <span class="text-blue-500">Elite</span></span>
                <div class="flex items-center mt-[-4px]">
                    <span id="bot-led" class="led-bot led-offline"></span>
                    <span id="bot-status-text" class="text-[7px] font-bold uppercase text-slate-500">Bot Offline</span>
                </div>
            </div>
            <button onclick="window.acessoAdmin()" class="glass px-4 py-1.5 rounded-lg text-[9px] font-black uppercase text-white">ADM</button>
        </header>
        <div class="flex-grow flex items-center justify-center p-4">
            <div class="glass p-6 rounded-[2.5rem] w-full max-w-sm text-center">
                <h2 id="escola-titulo" class="text-xl font-extrabold uppercase text-blue-400 leading-none italic">AGUARDE...</h2>
                <h3 id="sub-escola" class="text-[9px] font-bold text-slate-500 mb-4 uppercase italic">CONECTANDO</h3>
                <div class="grid grid-cols-2 gap-1 mb-3" id="day-selector"></div>
                <form id="form-agendamento" class="space-y-2">
                    <input type="hidden" id="data-selecionada">
                    <input type="text" id="nome" required placeholder="Nome do Formando" class="input-compact text-white">
                    <input type="tel" id="telefone" required placeholder="WhatsApp" class="input-compact text-white">
                    <select id="horario" required class="input-compact text-white">
                        <option value="">Selecione o Dia</option>
                    </select>
                    <textarea id="endereco" required placeholder="Endereço Completo" class="input-compact text-white" rows="2"></textarea>
                    <button type="submit" class="btn-primary w-full py-4 rounded-xl font-black uppercase text-sm">Agendar Visita</button>
                </form>
            </div>
        </div>
    </section>

    <section id="view-logistica" class="view-section p-4">
        <nav class="flex justify-between items-center mb-6 text-white text-white">
            <button onclick="window.switchView('view-agendamento')" class="text-slate-500 text-[10px] font-black uppercase text-white">← Sair</button>
            <div class="flex gap-2 p-1 glass rounded-2xl">
                <button class="bg-blue-600 px-4 py-1.5 rounded-lg text-[10px] font-black">Visitas</button>
                <button onclick="window.switchView('view-financeiro')" class="px-4 py-1.5 text-slate-400 text-[10px] font-black uppercase">Dashboard BI</button>
            </div>
        </nav>

        <div class="glass mx-auto max-w-sm mb-4 p-3 rounded-2xl flex justify-between items-center border-l-4 border-amber-500">
            <div>
                <p class="text-[8px] text-slate-500 uppercase font-black">Projeto Ativo</p>
                <h4 id="nome-projeto-logistica" class="text-[10px] font-black text-amber-500 uppercase italic">Carregando...</h4>
            </div>
            <button onclick="window.abrirSeletorProjetos()" class="bg-white/10 hover:bg-white/20 px-3 py-2 rounded-xl text-[8px] font-black uppercase text-white transition-all">
                🔄 Trocar
            </button>
        </div>

        <div id="controles-admin" class="hidden flex flex-wrap gap-2 mb-4 justify-center">
            <button onclick="window.abrirNovoProjeto()" class="glass px-4 py-2 rounded-xl text-[8px] font-black text-emerald-400 uppercase">Novo Projeto</button>
            <button onclick="window.abrirGestaoCentralizada()" class="glass px-4 py-2 rounded-xl text-[8px] font-black text-blue-400 uppercase">Dados Projeto</button>
            <button onclick="window.abrirGestaoVales()" class="glass px-4 py-2 rounded-xl text-[8px] font-black text-rose-400 uppercase">Lançar Vales</button>
            <button onclick="window.switchView('view-automacao')" class="bg-amber-500/20 border border-amber-500/30 px-4 py-2 rounded-xl text-[8px] font-black text-amber-500 uppercase italic">Automação PC 🚀</button>
        </div>
        <div class="flex gap-2 mb-4">
            <input type="date" id="filtro-data-logistica" onchange="window.filtrarLogistica()" class="flex-grow bg-slate-900 border border-white/10 rounded-xl px-4 py-2 text-xs font-bold text-white outline-none">
            <button onclick="window.abrirAvulso()" class="bg-white text-black px-4 py-2 rounded-xl text-[9px] font-black uppercase">+ AVULSO</button>
        </div>
        <div id="lista-visitas" class="space-y-3 pb-10"></div>
    </section>

    <section id="view-financeiro" class="view-section p-4 text-white">
        <nav class="flex justify-between items-center mb-4 text-white text-white">
            <button onclick="window.switchView('view-logistica')" class="text-slate-500 text-[10px] font-black uppercase text-white">← Voltar</button>
            <div class="flex gap-2">
                <button onclick="window.menuRelatorio()" class="bg-emerald-600 px-3 py-2 rounded-xl text-[9px] font-black uppercase italic">Copiar Relatório 📋</button>
                <input type="date" id="filtro-bi" onchange="window.filtrarBI()" class="bg-slate-900 border border-white/10 rounded-xl px-3 py-2 text-xs text-white outline-none">
            </div>
        </nav>
        <div id="kpi-grid" class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-6 text-white"></div>
        <div id="individual-performance" class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6 text-white text-white"></div>
        <div id="finance-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-2 mb-6 text-white text-white"></div>
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 mb-6">
            <div id="comissao-card" class="lg:col-span-1 glass rounded-[2rem] p-5 border-l-4 border-blue-500 text-white text-white"></div>
            <div class="lg:col-span-2 glass rounded-[2rem] p-4 min-h-[250px] text-white">
                <canvas id="weeklyChart"></canvas>
            </div>
        </div>
        <div id="saldo-card" class="glass rounded-[2rem] p-6 border-l-8 border-emerald-500 mb-6 text-white text-white"></div>
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 pb-10">
            <div class="glass p-4 rounded-2xl border border-white/5 text-white">
                <div class="flex justify-between items-center mb-3 text-white">
                    <h4 class="text-emerald-400 font-black text-[10px] uppercase">Extrato Vendas</h4>
                    <span class="text-[8px] text-slate-500 text-white">VALOR</span>
                </div>
                <div id="extrato-tabela" class="text-xs text-white"></div>
            </div>
            <div class="glass p-4 rounded-2xl border border-white/5 text-white">
                <h4 class="text-rose-500 font-black text-[10px] mb-3 uppercase text-white">NQ</h4>
                <div id="nq-tabela" class="text-xs text-white text-white"></div>
            </div>
        </div>
    </section>

    <section id="view-automacao" class="view-section p-4 text-white">
        <nav class="flex justify-between items-center mb-6 text-white">
            <button onclick="window.switchView('view-logistica')" class="text-slate-500 text-[10px] font-black uppercase text-white">← Voltar</button>
            <span class="text-amber-500 font-black text-[10px] uppercase italic text-white">Motor Elite Auto-Zap</span>
        </nav>
        <div class="glass p-8 rounded-[3rem] text-center mb-6 text-white">
            <div id="status-automacao" class="text-[9px] font-black text-slate-500 uppercase mb-2 text-white">Pronto para iniciar</div>
            <div id="timer-display" class="text-5xl font-black text-white mb-6">00:00</div>
            <div class="flex gap-3 justify-center">
                <button id="btn-start-auto" onclick="window.iniciarCampanha()" class="bg-emerald-600 px-8 py-4 rounded-2xl font-black uppercase text-xs shadow-lg">Iniciar Campanha</button>
                <button id="btn-stop-auto" onclick="window.pararCampanha()" class="bg-rose-600 hidden px-8 py-4 rounded-2xl font-black uppercase text-xs">Pausar</button>
            </div>
        </div>
        <div class="glass p-5 rounded-[2rem]">
            <div class="flex justify-between items-center mb-4 text-white">
                <h4 class="text-[10px] font-black uppercase text-blue-400">Fila de Envios</h4>
                <button onclick="window.resetIndex()" class="text-[8px] text-slate-600 font-bold uppercase">Reiniciar Fila</button>
            </div>
            <div id="lista-fila" class="space-y-2 max-h-64 overflow-y-auto text-[10px] text-white"></div>
        </div>
    </section>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getDatabase, ref, get, set, remove, update, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBgI-e0X57TQVpZQmvrmdXhTzLPI5Em55c",
            databaseURL: "https://agenda-album-de-formatura-default-rtdb.firebaseio.com",
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const fBR = (v) => new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(Number(v) || 0);
        let projId = "";
        window.dadosCompletos = [];
        let custosDB = {};
        let valesDB = {};
        let projetoDB = {};
        let weeklyChart = null;

        // --- CONEXÃO INALTERADA ---
        onValue(ref(db, "config/projeto_ativo"), async (snap) => {
            projId = snap.val() || "guaratingueta-guilherme";
            const pS = await get(ref(db, `projetos/${projId}`));
            if (pS.exists()) {
                projetoDB = pS.val();
                document.getElementById('escola-titulo').innerText = projetoDB.cidade;
                document.getElementById('sub-escola').innerText = projetoDB.escola || projetoDB.school;
                
                if(document.getElementById('nome-projeto-logistica')) {
                    document.getElementById('nome-projeto-logistica').innerText = projetoDB.cidade + " - " + (projetoDB.escola || projetoDB.school || "Escola não informada");
                }

                if (projetoDB.data_inicio) {
                    window.gerarBotoesDatas(projetoDB.data_inicio, projetoDB.data_fim);
                }

                window.carregarRelatorio();

                if (sessionStorage.getItem('isAdm') === 'true') {
                    document.getElementById('controles-admin').classList.remove('hidden');
                }

                onValue(ref(db, `projetos/${projId}/bot`), (botSnap) => {
                    const led = document.getElementById('bot-led');
                    const txt = document.getElementById('bot-status-text');
                    const botData = botSnap.val();

                    if (botData && botData.status === 'Online') {
                        led.className = 'led-bot led-online';
                        txt.innerText = 'Bot Ativo';
                        txt.className = 'text-[7px] font-bold uppercase text-emerald-400';
                    } else {
                        led.className = 'led-bot led-offline';
                        txt.innerText = 'Bot Offline';
                        txt.className = 'text-[7px] font-bold uppercase text-slate-500';
                    }
                });
            }
        });

        // --- MOTOR AUTOMAÇÃO ---
        let autoAtivo = false;
        let timerInterval = null;
        let abaWhats = null;

        window.iniciarCampanha = () => {
            if (!projetoDB.automacao?.lista) return alert("Configure a lista!");
            autoAtivo = true;
            document.getElementById('btn-start-auto').classList.add('hidden');
            document.getElementById('btn-stop-auto').classList.remove('hidden');
            window.dispararProximo();
        };

        window.pararCampanha = () => {
            autoAtivo = false;
            if (timerInterval) clearInterval(timerInterval);
            document.getElementById('btn-start-auto').classList.remove('hidden');
            document.getElementById('btn-stop-auto').classList.add('hidden');
            document.getElementById('timer-display').innerText = "00:00";
        };

        window.dispararProximo = async () => {
            if (!autoAtivo) return;
            const lista = projetoDB.automacao.lista.split('\n').filter(l => l.trim() !== "");
            const idx = projetoDB.automacao.index_atual || 0;

            if (idx >= lista.length) {
                document.getElementById('status-automacao').innerText = "TAREFA CONCLUÍDA";
                return window.pararCampanha();
            }

            const dados = lista[idx].split(',');
            const nome = dados[0].trim();
            const fone = dados[1].trim().replace(/\D/g, '');

            const nomeEscola = projetoDB.escola || projetoDB.school || "Escola";
            const msgN = (idx % 4) + 1;
            let msgB = projetoDB.automacao[`msg${msgN}`] || projetoDB.automacao.msg1;

            const msgFinal = msgB
                .replace(/{crianca}/g, nome)
                .replace(/{criança}/g, nome)
                .replace(/{escola}/g, nomeEscola);

            const prox = idx + 1;

            try {
                await update(ref(db, `projetos/${projId}/automacao`), {
                    index_atual: prox
                });
                projetoDB.automacao.index_atual = prox;
                window.renderFila();
                document.getElementById('status-automacao').innerText = `Enviando para: ${nome}`;
                const urlZap = `https://web.whatsapp.com/send?phone=55${fone}&text=${encodeURIComponent(msgFinal)}`;

                if (!abaWhats || abaWhats.closed) {
                    abaWhats = window.open(urlZap, 'zapJanela');
                } else {
                    abaWhats.location.href = urlZap;
                    abaWhats.focus();
                }

                let delayAbertura = (idx === 0) ? 12000 : 7000;
                await new Promise(r => setTimeout(r, delayAbertura));

                if (prox >= lista.length) {
                    setTimeout(() => {
                        window.pararCampanha();
                        document.getElementById('status-automacao').innerText = "FIM DA LISTA";
                    }, 2000);
                    return;
                }
                const randSeg = Math.floor(Math.random() * (660 - 180 + 1)) + 180;
                window.iniciarContagem(randSeg);
            } catch (err) {
                console.error(err);
                window.pararCampanha();
            }
        };

        window.iniciarContagem = (seg) => {
            if (timerInterval) clearInterval(timerInterval);
            let rest = seg;
            timerInterval = setInterval(() => {
                if (!autoAtivo) {
                    clearInterval(timerInterval);
                    return;
                }
                const m = Math.floor(rest / 60);
                const s = rest % 60;
                document.getElementById('timer-display').innerText =
                    `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
                if (rest <= 0) {
                    clearInterval(timerInterval);
                    window.dispararProximo();
                }
                rest--;
            }, 1000);
        };

        // --- FUNÇÃO PARA ABRIR O SELETOR DE PROJETOS ---
        window.abrirSeletorProjetos = async () => {
            document.getElementById('modalGestao').style.display = 'flex';
            document.getElementById('gestao-menu').classList.add('hidden');
            const f = document.getElementById('gestao-form');
            f.classList.remove('hidden');
            f.innerHTML = `<h3 class="text-white font-black text-xs uppercase mb-4 text-center">Selecionar Projeto</h3><div id="lista-projetos-selecao" class="space-y-2 max-h-60 overflow-y-auto">Carregando projetos...</div>`;

            try {
                const snap = await get(ref(db, "projetos"));
                if (snap.exists()) {
                    const projetos = snap.val();
                    let html = "";
                    Object.keys(projetos).forEach(id => {
                        const p = projetos[id];
                        const estaAtivo = (id === projId);
                        const nomeEscola = p.escola || p.school || "Escola não informada";
                        html += `
                            <div class="flex gap-2 items-stretch">
                                <button onclick="window.ativarProjeto('${id}')" 
                                    class="flex-grow p-4 rounded-2xl text-left transition-all border ${estaAtivo ? 'border-amber-500 bg-amber-500/20' : 'border-white/5 bg-white/5 hover:bg-white/10'}">
                                    <div class="flex justify-between items-center">
                                        <span class="text-[10px] font-bold text-white uppercase">${p.cidade}</span>
                                        ${estaAtivo ? '<span class="text-[8px] bg-amber-500 text-black px-2 py-0.5 rounded font-black">ATIVO</span>' : ''}
                                    </div>
                                    <p class="text-[8px] text-slate-500">${nomeEscola}</p>
                                </button>
                                <div class="flex flex-col gap-1">
                                    <button onclick="window.editarInfoProjeto('${id}')" class="bg-blue-950/30 border border-blue-500/20 px-3 flex-grow rounded-xl text-[10px] hover:bg-blue-500 hover:text-white transition-all">✏️</button>
                                    <button onclick="window.excluirProjeto('${id}')" class="bg-rose-950/30 border border-rose-500/20 px-3 flex-grow rounded-xl text-[10px] hover:bg-rose-500 hover:text-white transition-all">🗑️</button>
                                </div>
                            </div>`;
                    });
                    document.getElementById('lista-projetos-selecao').innerHTML = html;
                }
            } catch (e) {
                console.error(e);
            }
        };

        // --- FUNÇÃO PARA EDITAR INFO DO PROJETO ---
        window.editarInfoProjeto = async (id) => {
            const snap = await get(ref(db, `projetos/${id}`));
            if (snap.exists()) {
                const p = snap.val();
                document.getElementById('modalGestao').style.display = 'flex';
                document.getElementById('gestao-menu').classList.add('hidden');
                const f = document.getElementById('gestao-form');
                f.classList.remove('hidden');
                f.innerHTML = `
                    <h3 class="text-blue-400 font-black text-[10px] uppercase mb-4">Editar Projeto</h3>
                    <input type="text" id="editC" value="${p.cidade || ''}" placeholder="Cidade" class="input-compact mb-2">
                    <input type="text" id="editS" value="${p.escola || p.school || ''}" placeholder="Escola" class="input-compact mb-2">
                    <div class="flex gap-2 mb-4">
                        <input type="date" id="editSt" value="${p.data_inicio || ''}" class="input-compact flex-grow text-[10px]">
                        <input type="date" id="editEd" value="${p.data_fim || ''}" class="input-compact flex-grow text-[10px]">
                    </div>
                    <button onclick="window.salvarEdicaoProjeto('${id}')" class="btn-primary w-full py-4 rounded-xl font-black uppercase text-xs">Salvar Alterações</button>
                `;
            }
        };

        window.salvarEdicaoProjeto = async (id) => {
            await update(ref(db, `projetos/${id}`), {
                cidade: document.getElementById('editC').value,
                escola: document.getElementById('editS').value,
                data_inicio: document.getElementById('editSt').value,
                data_fim: document.getElementById('editEd').value
            });
            alert("✅ Projeto atualizado!");
            location.reload();
        };

        // --- FUNÇÃO PARA TROCAR O PROJETO NO BANCO ---
        window.ativarProjeto = async (id) => {
            if (confirm(`Deseja alternar para o projeto: ${id.toUpperCase()}?`)) {
                await set(ref(db, "config/projeto_ativo"), id);
                location.reload(); 
            }
        };

        // --- FUNÇÃO PARA EXCLUIR PROJETO ---
        window.excluirProjeto = async (id) => {
            if (confirm(`⚠️ ATENÇÃO: Deseja realmente excluir o projeto ${id.toUpperCase()}? Isso apagará todos os dados vinculados a ele!`)) {
                try {
                    await remove(ref(db, `projetos/${id}`));
                    await remove(ref(db, `custos/${id}`));
                    await remove(ref(db, `vendas/${id}`));

        window.obterHorariosArray = (d, a = false) => {
            const doB = new Date(d + "T00:00:00");
            const fds = (doB.getDay() === 0 || doB.getDay() === 6);
            let hL = [];
            const f = fds ? 17 : 20.5;
            for (let h = 9; h <= f; h += 0.5) {
                const hh = Math.floor(h).toString().padStart(2, '0');
                const mm = (h % 1 === 0) ? '00' : '30';
                hL.push(`${hh}:${mm}`);
            }
            if (!a) {
                const ag = new Date();
                const hj = ag.toLocaleDateString('en-CA');
                if (d === hj) {
                    const mL = (ag.getHours() * 60) + ag.getMinutes() + 180;
                    hL = hL.filter(h => {
                        const p = h.split(':').map(Number);
                        return (p[0] * 60 + p[1]) >= mL;
                    });
                }
            }
            return hL;
        };

            while (cur <= new Date(f + "T00:00:00")) {
                const iso = cur.toISOString().split('T')[0];
                if (iso >= hj) {
                    if (!(iso === hj && window.obterHorariosArray(iso, false).length === 0)) {
                        c.innerHTML += `<button type="button" onclick="window.selecionarDia(this, '${iso}')" class="day-btn text-white">${cur.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'})}</button>`;

                    if (contagem < 2) { selectH.innerHTML += `<option value="${h}">${h}</option>`; }
                });
                if (selectH.options.length <= 1) { selectH.innerHTML = '<option value="">Agenda lotada!</option>'; }
            } catch (error) { selectH.innerHTML = '<option value="">Erro carregar horários</option>'; }
        };

        document.getElementById('form-agendamento').onsubmit = async (e) => {
            e.preventDefault();
            const dt = document.getElementById('data-selecionada').value;
            if (!dt) return alert("Selecione o Dia!");
            const n = document.getElementById('nome').value;
            const t = document.getElementById('telefone').value;
            const h = document.getElementById('horario').value;
            const ed = document.getElementById('endereco').value;
            await set(ref(db, `dados/${projId}/agendamentos/${dt}/AG-${Date.now()}`), {
                nome_formando: n, telefone: t, endereco: ed, horario: h, resultado: "Pendente"
            });
            alert("✅ VISITA AGENDADA!");
            window.location.href = `https://wa.me/5516993291674?text=${encodeURIComponent("Agendamento Elite: "+n)}`;
        };

        window.carregarRelatorio = async () => {
            if (!projId) return;
            try {
                const [sA, sV, sC, sVales] = await Promise.all([
                    get(ref(db, `dados/${projId}/agendamentos`)), get(ref(db, `vendas/${projId}`)),
                    get(ref(db, `custos/${projId}`)), get(ref(db, `vales/${projId}`))
                ]);
                window.dadosCompletos = [];
                custosDB = sC.exists() ? sC.val() : {};
                valesDB = sVales.exists() ? sVales.val() : { evanio: 0, willian: 0 };
                const proc = (pasta, base) => {
                    if (!pasta) return;
                    Object.keys(pasta).forEach(k => {
                        const item = pasta[k];
                        if (typeof item === 'object' && !item.nome_formando) {
                            Object.keys(item).forEach(subK => window.dadosCompletos.push({ ...item[subK], id: subK, data: k, path: `${base}/${k}/${subK}` }));
                        } else window.dadosCompletos.push({ ...item, id: k, data: item.data || k, path: `${base}/${k}` });
                    });
                };
                if (sA.exists()) proc(sA.val(), `dados/${projId}/agendamentos`);
                if (sV.exists()) {
                    const v = sV.val();
                    if (v.avulsos) proc(v.avulsos, `vendas/${projId}/avulsos`);
                    if (v.agendamentos) proc(v.agendamentos, `vendas/${projId}/agendamentos`);
                }
                window.filtrarLogistica(); window.filtrarBI(); window.renderFila();
            } catch (e) { console.error(e); }
        };

        window.resetIndex = async () => {
            if (confirm("Reiniciar fila?")) { await update(ref(db, `projetos/${projId}/automacao`), { index_atual: 0 }); location.reload(); }
        };

        window.confirmarExclusao = async () => {
            if (confirm("Excluir?")) { await remove(ref(db, window.itemPath)); window.carregarRelatorio(); window.fecharModalGestao(); }
        };

        window.limparRegistroVisita = async () => {
            if (confirm("Zerar?")) await update(ref(db, window.itemPath), { resultado: "Pendente", valor: 0, pagamentos: null, num_album: "" });
            window.carregarRelatorio(); window.fecharModalGestao();
        };

        window.abrirNovoProjeto = () => {
            document.getElementById('modalGestao').style.display = 'flex';
            document.getElementById('gestao-menu').classList.add('hidden');
            const f = document.getElementById('gestao-form');
            f.classList.remove('hidden');
            f.innerHTML = `<h3 class="text-emerald-400 font-black text-[10px] uppercase mb-4 text-white">Novo Projeto</h3><input type="text" id="pC" placeholder="Cidade" class="input-compact mb-2 text-white"><input type="text" id="pS" placeholder="Escola" class="input-compact mb-2 text-white"><div class="flex gap-2 mb-4 text-white"><input type="date" id="pSt" class="input-compact flex-grow text-white"><input type="date" id="pEd" class="input-compact flex-grow text-white"></div><button onclick="window.salvarNovoProjeto()" class="btn-primary w-full py-4 rounded-xl font-black uppercase text-xs text-white">Criar</button>`;
        };

        window.salvarNovoProjeto = async () => {
            const city = document.getElementById('pC').value;
            const id = city.toLowerCase().replace(/\s+/g, '-');
            await set(ref(db, `projetos/${id}`), { cidade: city, escola: document.getElementById('pS').value, data_inicio: document.getElementById('pSt').value, data_fim: document.getElementById('pEd').value });
            await set(ref(db, "config/projeto_ativo"), id);
            location.reload();
        };

        window.abrirGestaoVales = () => {
            document.getElementById('modalGestao').style.display = 'flex';
            document.getElementById('gestao-menu').classList.add('hidden');
            const f = document.getElementById('gestao-form');
            f.classList.remove('hidden');
            f.innerHTML = `<h3 class="text-rose-400 font-black text-[10px] uppercase mb-4 text-center text-white">Lançar Vales</h3><div class="space-y-4 text-white"><div class="bg-white/5 p-3 rounded-2xl text-white"><p class="text-[8px] text-blue-400 font-bold uppercase mb-1 text-white">EVANIO</p><input type="number" id="vEva" value="${valesDB.evanio||0}" class="input-compact text-white"></div><div class="bg-white/5 p-3 rounded-2xl text-white"><p class="text-[8px] text-cyan-400 font-bold uppercase mb-1 text-white">WILLIAN</p><input type="number" id="vWil" value="${valesDB.willian||0}" class="input-compact text-white"></div></div><button onclick="window.salvarVales()" class="btn-primary w-full py-4 rounded-xl font-black uppercase text-xs mt-4 text-white">Salvar</button>`;
        };

        window.salvarVales = async () => {
            await update(ref(db, `vales/${projId}`), { evanio: document.getElementById('vEva').value, willian: document.getElementById('vWil').value });
            await window.carregarRelatorio(); window.fecharModalGestao();
        };

        window.abrirAvulso = () => {
            document.getElementById('modalGestao').style.display = 'flex';
            document.getElementById('gestao-menu').classList.add('hidden');
            const f = document.getElementById('gestao-form');
            f.classList.remove('hidden');
            f.innerHTML = `<h3 class="text-white font-black text-xs uppercase mb-3 text-white">Novo Avulso</h3><input type="text" id="avN" placeholder="Nome" class="input-compact mb-2 text-white"><input type="date" id="avD" class="input-compact mb-2 text-white"><button onclick="window.salvarAvulso()" class="btn-primary w-full p-3 rounded-xl text-[10px] font-black uppercase text-white">Salvar</button>`;
        };

        // --- FUNÇÃO PARA ABRIR O SELETOR DE PROJETOS ---
        window.abrirSeletorProjetos = async () => {
            document.getElementById('modalGestao').style.display = 'flex';
            document.getElementById('gestao-menu').classList.add('hidden');
            const f = document.getElementById('gestao-form');
            f.classList.remove('hidden');
            f.innerHTML = `<h3 class="text-white font-black text-xs uppercase mb-4 text-center">Selecionar Projeto</h3><div id="lista-projetos-selecao" class="space-y-2 max-h-60 overflow-y-auto">Carregando...</div>`;
            try {
                const snap = await get(ref(db, "projetos"));
                if (snap.exists()) {
                    const projetos = snap.val();
                    let html = "";
                    Object.keys(projetos).forEach(id => {
                        const p = projetos[id];
                        const estaAtivo = (id === projId);
                        const nomeEscola = p.escola || p.school || "Escola não informada";
                        html += `
                            <div class="flex gap-2 items-stretch">
                                <button onclick="window.ativarProjeto('${id}')" 
                                    class="flex-grow p-4 rounded-2xl text-left transition-all border ${estaAtivo ? 'border-amber-500 bg-amber-500/20' : 'border-white/5 bg-white/5 hover:bg-white/10'}">
                                    <div class="flex justify-between items-center">
                                        <span class="text-[10px] font-bold text-white uppercase">${p.cidade}</span>
                                        ${estaAtivo ? '<span class="text-[8px] bg-amber-500 text-black px-2 py-0.5 rounded font-black">ATIVO</span>' : ''}
                                    </div>
                                    <p class="text-[8px] text-slate-500">${nomeEscola}</p>
                                </button>
                                <div class="flex flex-col gap-1">
                                    <button onclick="window.editarInfoProjeto('${id}')" class="bg-blue-950/30 border border-blue-500/20 px-3 flex-grow rounded-xl text-[10px] hover:bg-blue-500 hover:text-white transition-all">✏️</button>
                                    <button onclick="window.excluirProjeto('${id}')" class="bg-rose-950/30 border border-rose-500/20 px-3 flex-grow rounded-xl text-[10px] hover:bg-rose-500 hover:text-white transition-all">🗑️</button>
                                </div>
                            </div>`;
                    });
                    document.getElementById('lista-projetos-selecao').innerHTML = html;
                }
            } catch (e) { console.error(e); }
        };

        // --- FUNÇÃO PARA EDITAR INFO DO PROJETO ---
        window.editarInfoProjeto = async (id) => {
            const snap = await get(ref(db, `projetos/${id}`));
            if (snap.exists()) {
                const p = snap.val();
                document.getElementById('modalGestao').style.display = 'flex';
                document.getElementById('gestao-menu').classList.add('hidden');
                const f = document.getElementById('gestao-form');
                f.classList.remove('hidden');
                f.innerHTML = `
                    <h3 class="text-blue-400 font-black text-[10px] uppercase mb-4">Editar Projeto</h3>
                    <input type="text" id="editC" value="${p.cidade || ''}" placeholder="Cidade" class="input-compact mb-2">
                    <input type="text" id="editS" value="${p.escola || p.school || ''}" placeholder="Escola" class="input-compact mb-2">
                    <div class="flex gap-2 mb-4">
                        <input type="date" id="editSt" value="${p.data_inicio || ''}" class="input-compact flex-grow text-[10px]">
                        <input type="date" id="editEd" value="${p.data_fim || ''}" class="input-compact flex-grow text-[10px]">
                    </div>
                    <button onclick="window.salvarEdicaoProjeto('${id}')" class="btn-primary w-full py-4 rounded-xl font-black uppercase text-xs">Salvar Alterações</button>
                `;
            }
        };

        window.salvarEdicaoProjeto = async (id) => {
            await update(ref(db, `projetos/${id}`), {
                cidade: document.getElementById('editC').value,
                escola: document.getElementById('editS').value,
                data_inicio: document.getElementById('editSt').value,
                data_fim: document.getElementById('editEd').value
            });
            alert("✅ Projeto atualizado!");
            location.reload();
        };

        // --- FUNÇÃO PARA TROCAR O PROJETO NO BANCO ---
        window.ativarProjeto = async (id) => {
            if (confirm(`Deseja alternar para o projeto: ${id.toUpperCase()}?`)) {
                await set(ref(db, "config/projeto_ativo"), id); location.reload(); 
            }
        };

        // --- FUNÇÃO PARA EXCLUIR PROJETO ---
        window.excluirProjeto = async (id) => {
            if (confirm(`⚠️ EXCLUIR PROJETO ${id.toUpperCase()}?`)) {
                try {
                    await Promise.all([remove(ref(db, `projetos/${id}`)), remove(ref(db, `custos/${id}`)), remove(ref(db, `vendas/${id}`)), remove(ref(db, `dados/${id}`))]);
                    alert("Projeto excluído!"); window.abrirSeletorProjetos();
                } catch (e) { alert("Erro: " + e.message); }
            }
        };
    </script>
</body>

</html>
